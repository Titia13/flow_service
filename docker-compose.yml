services:
  app:
    build: .
    ports:
      - "8001:8000"
    environment:
      - MONGO_URL=mongodb://db:27017/flow_db
    depends_on:
      - db

  db:
    image: mongo:latest
    ports:
      - "27020:27017"
    volumes:
      - mongo-data:/data/db
  flow_frontend:
    build: ./flow-frontend
    ports:
      - "3003:3000"
    depends_on:
      - app
      
volumes:
  mongo-data:


