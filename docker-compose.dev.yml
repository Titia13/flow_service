services:
  flow-app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: flow-app:dev
    container_name: flow-app-dev
    ports:
      - "3001:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    command: npm run dev 

# command: npm run dev  (optionnel)